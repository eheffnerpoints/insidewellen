<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Inside Wellen</title>

<style>
body {
margin: 0;
padding: 0;
background: #F7F5F1;
font-family: Georgia, serif;
color: #3E4742;
}

.container {
min-height: 100vh;
display: flex;
align-items: center;
justify-content: center;
padding: 40px;
}

.content {
max-width: 600px;
}

.eyebrow {
color: #4F665A;
font-size: 14px;
letter-spacing: 2px;
text-transform: uppercase;
margin-bottom: 20px;
font-family: Arial, sans-serif;
}

h1 {
font-size: 72px;
line-height: 0.95;
margin: 0 0 30px 0;
font-weight: normal;
}

p {
font-size: 20px;
line-height: 1.7;
color: #666666;
font-family: Arial, sans-serif;
margin-bottom: 30px;
}

.launching {
display: inline-block;
padding: 12px 20px;
border: 1px solid rgba(79,102,90,0.25);
border-radius: 999px;
color: #4F665A;
font-family: Arial, sans-serif;
font-size: 14px;
}

@media (max-width: 768px) {
h1 {
font-size: 48px;
}

p {
font-size: 18px;
}
}
</style>
</head>

<body>
<div class="container">
<div class="content">
<div class="eyebrow">Inside Wellen</div>

<h1>
Your Independent Guide to Wellen Park
</h1>

<p>
Local guides, restaurant updates, development news,
events, and what’s coming next — all in one place.
</p>

<div class="launching">
Launching Soon
</div>
</div>
</div>
</body>
</html>
